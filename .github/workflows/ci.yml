name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate Composer metadata
        run: composer validate --strict

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check Markdown formatting
        run: npx --yes prettier --check "**/*.md" "skills/**/*.md"
